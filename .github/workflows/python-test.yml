---
# This workflow will install Python dependencies and run tests
# across operating systems, select versions of Python, and user + dev environments
# For more info see:
# https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: CI/CD tests

on:
  push:
    branches: [main, dev]
    paths-ignore: # prevents workflow execution when only these types of files are modified
      - "**.md" # wildcards prevent file in any repo dir from trigering workflow
      - "**.bib"
      - "**.ya?ml" # captures both .yml and .yaml
      - "LICENSE"
      - ".gitignore"
      - "**.ipynb" # ignore Jupyter notebooks

  pull_request:
    branches: [main, dev]
    types: [opened, reopened, synchronize]
    paths-ignore:
      - "**.md"
      - "**.bib"
      - "**.ya?ml"
      - "LICENSE"
      - ".gitignore"
      - "**.ipynb" # ignore Jupyter notebooks
  workflow_dispatch: # also allow manual trigger, for testing purposes

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        py-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Set up Python ${{ matrix.py-version }}
        run: uv python install ${{ matrix.py-version }}

      - name: Install dependencies
        run: uv sync --extra testing

      - name: Test with pytest
        run: uv run pytest --cov-report xml

      - name: Performance regression gate
        if: matrix.os == 'ubuntu-latest' && matrix.py-version == '3.13'
        env:
          BW_TIMEX_ENABLE_PERF_TESTS: "1"
          BW_TIMEX_PERF_SMALL_TOTAL_SEC: "120"
          BW_TIMEX_PERF_SMALL_PEAK_MB: "1024"
          BW_TIMEX_PERF_MEDIUM_TOTAL_SEC: "180"
          BW_TIMEX_PERF_MEDIUM_PEAK_MB: "1536"
          BW_TIMEX_PERF_LARGE_TOTAL_SEC: "240"
          BW_TIMEX_PERF_LARGE_PEAK_MB: "2048"
        run: uv run pytest tests/test_performance_pipeline.py --maxfail=1

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.py-version == '3.13'
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: true
